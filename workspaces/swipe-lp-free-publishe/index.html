    <style>
      /* =====================================================
       CSS変数 — アスペクト比はJSで上書きされる

      :root {
        --ratio-w: 9;

        --cta-height: 80px;
        --pagination-height: 36px;
        --slide-bg: #111;

      html,

      /* =====================================================

      }

      /* =====================================================
       スライダーラッパー
       スマホ: 幅100%基準
       PC: 高さ基準で中央寄せ
       ===================================================== */
      #slider-wrapper {
        position: fixed;
        top: var(--pagination-height);
        left: 0;
        right: 0;
        bottom: var(--cta-height);
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }

      #swiper-container {
        /*
        スマホ: 幅100%を基準にアスペクト比で高さを決める
        PC: 利用可能高さを基準にアスペクト比で幅を決める
        どちらもJSで計算してwidthとheightをセット

        position: relative;

        overflow: hidden;

      .swiper-slide {

      }

      .swiper-slide img {
        width: 100%;

        object-fit: cover;
        display: block;
        /* ドラッグ操作中に画像選択が走らないように */

      /* =====================================================
       0枚のときのエラー表示
       ===================================================== */

        display: none;

        justify-content: center;

      }

      #no-slides-message.visible {
        display: flex;
      }

      #no-slides-message p {
        font-size: 15px;
        line-height: 1.7;
      }

      #no-slides-message code {
        background: #222;
        color: #ccc;
        padding: 2px 8px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 13px;
      }

      /* =====================================================
       スワイプヒント（初回のみ、3秒後に一度だけフェードアウトして消える）

       【設計メモ】
       animation の forwards と transition の競合を避けるため、
       フェードインは opacity 0 スタートの animation、
       フェードアウトは JS 側で rAF を使い animation を先に剥がしてから
       opacity: 0 → transition 発火させる2段構えを採用している。
       CSS だけで animation: none と opacity: 0 を同一フレームに当てると
       transition の起点が確定する前に終点が適用されてしまい瞬時消えになる。
       ===================================================== */
      #swipe-hint {
        position: absolute;
        bottom: 20%;
        left: 50%;
        transform: translateX(-50%);
        /* チャコール半透明背景 + 白文字で明暗問わず視認性確保 */
        background: rgba(45, 45, 45, 0.55);
        color: #FFFFFF;
        padding: 12px 24px;
        border-radius: 24px;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
        font-size: 14px;
        letter-spacing: 0.1em;
        pointer-events: none;
        z-index: 50;
        white-space: nowrap;
        /* フェードアウト用 transition はベースに置く（.hidden 付与前から存在していないと発火しない） */
        transition: opacity 0.8s ease;
        /* フェードイン: 表示開始時に1回だけ実行（infinite 禁止） */
        animation: hint-fadein 0.4s ease forwards;
      }

      /* .hidden は opacity だけ指定（animation の操作は JS 側で行う） */
      #swipe-hint.hidden {
        opacity: 0;
      }

      /* フェードアウト完了後に完全非表示（transitionend でJSが付与） */
      #swipe-hint.gone {
        display: none;
      }

      /* PC表示（768px以上）で文字とパディングを拡大 */
      @media (min-width: 768px) {
        #swipe-hint {
          font-size: 18px;
          padding: 14px 32px;
        }
      }

      /* アニメーション軽減モード（vestibular disorder / 前庭障害対応） */
      @media (prefers-reduced-motion: reduce) {
        #swipe-hint {
          animation: none;
          transition: none;
        }
      }

      @keyframes hint-fadein {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      <!--

      href: Chatwork Web URL（README.md「公開時の設定手順」参照）

    <script>
      'use strict'

      /* =====================================================
         設定読み込み
         ===================================================== */

      /**
       * <meta name="lp-ratio"> からアスペクト比を読み取り、
       * CSS変数と数値ペアを返す。
       * 不正値の場合は 9:16 にフォールバック。
       */
      const readRatio = () => {
        const meta = document.querySelector('meta[name="lp-ratio"]')
        const raw = meta ? meta.getAttribute('content') : '9:16'
        const allowed = { '9:16': [9, 16], '1:1': [1, 1], '4:5': [4, 5], '16:9': [16, 9] }
        return allowed[raw] || [9, 16]
      }

      const [ratioW, ratioH] = readRatio()
      document.documentElement.style.setProperty('--ratio-w', ratioW)
      document.documentElement.style.setProperty('--ratio-h', ratioH)

      /**
       * <meta name="cta-bg-color"> / <meta name="cta-text-color"> から
       * CTAボタンの色を読み取り、CSS変数に反映する。
       * meta タグがなければデフォルト色にフォールバック。
       */
      const ctaBg = document.querySelector('meta[name="cta-bg-color"]')?.content || '#E8694A'
      const ctaText = document.querySelector('meta[name="cta-text-color"]')?.content || '#ffffff'
      document.documentElement.style.setProperty('--cta-bg', ctaBg)
      document.documentElement.style.setProperty('--cta-text', ctaText)

      /* =====================================================
         スライダーサイズ計算
         ===================================================== */

      /**
       * 利用可能エリア（pagination + CTA を除いた領域）に
       * アスペクト比を維持して最大サイズを計算する。
       */
      const calcSliderSize = () => {
        const ctaHeight = parseInt(
          getComputedStyle(document.documentElement).getPropertyValue('--cta-height'), 10
        )
        const paginationHeight = parseInt(
          getComputedStyle(document.documentElement).getPropertyValue('--pagination-height'), 10
        )
        const availW = window.innerWidth
        const availH = window.innerHeight - ctaHeight - paginationHeight

        // 幅基準で高さを計算
        const hFromW = availW * ratioH / ratioW
        if (hFromW <= availH) {
          return { width: availW, height: Math.round(hFromW) }
        }
        // 高さ基準で幅を計算（PC等の横長画面）
        const wFromH = availH * ratioW / ratioH
        return { width: Math.round(wFromH), height: availH }
      }

      const applySliderSize = () => {
        const { width, height } = calcSliderSize()
        const container = document.getElementById('swiper-container')
        container.style.width = width + 'px'
        container.style.height = height + 'px'
      }

      applySliderSize()
      window.addEventListener('resize', applySliderSize)

      /* =====================================================
         SlideLoader — imagesフォルダを連番で自動探索する
         ===================================================== */

      /**
       * images/slide-{n}.{ext} を HEAD リクエストで存在確認し、
       * 見つかった順に画像パスの配列を返す。
       * 拡張子は webp → jpg → png の順に試す。
       * 404 になった番号で打ち止め。
       */
      const SlideLoader = {
        EXTS: ['webp', 'jpg', 'png'],
        IMAGE_DIR: 'images',
        MAX_SLIDES: 200,

        _pad: (n) => String(n).padStart(2, '0'),

        _checkExists: async (url) => {
          try {
            const res = await fetch(url, { method: 'HEAD' })
            return res.ok
          } catch {
            return false
          }
        },

        /**
         * 連番スライドを探索して見つかったURLリストを返す。
         * @returns {Promise<string[]>}
         */
        load: async function () {
          const paths = []
          let n = 1
          while (n <= this.MAX_SLIDES) {
            const base = `${this.IMAGE_DIR}/slide-${this._pad(n)}`
            let found = null
            for (const ext of this.EXTS) {
              const url = `${base}.${ext}`
              if (await this._checkExists(url)) {
                found = url
                break
              }
            }
            if (!found) break
            paths.push(found)
            n++
          }
          return paths
        }
      }

      /* =====================================================
         GA4Tracker — slide_view / slide_time / cta_click
         ===================================================== */

      /**
       * GA4イベント計測モジュール。
       * gtag が未定義の場合はコンソールにフォールバック（ローカルテスト用）。
       */
      const GA4Tracker = {
        _send: (eventName, params) => {
          if (typeof gtag === 'function') {
            gtag('event', eventName, params)
          } else {
            // ローカルファイル開発時のフォールバック
            console.log('[GA4]', eventName, params)
          }
        },

        // 前スライドの情報（slide_time 計算用）
        _prev: { index: -1, enteredAt: 0 },
        _totalSlides: 0,

        init(totalSlides) {
          this._totalSlides = totalSlides
        },

        /**
         * スライドが表示されたとき呼び出す。
         * 前スライドの滞在時間を先に送信してから slide_view を送信する。
         */
        onSlideChange(newIndex) {
          const now = Date.now()

          // 前スライドの滞在時間を送信（初回以外）
          if (this._prev.index >= 0) {
            this._send('slide_time', {
              slide_index: this._prev.index,
              slide_time_ms: now - this._prev.enteredAt
            })
          }

          this._send('slide_view', {
            slide_index: newIndex,
            slide_number: newIndex + 1,
            total_slides: this._totalSlides
          })

          this._prev = { index: newIndex, enteredAt: now }
        },

        /**
         * ページ離脱時（visibilitychange: hidden）に最後のスライドの滞在時間を送信。
         */
        onPageHide() {
          if (this._prev.index < 0) return
          this._send('slide_time', {
            slide_index: this._prev.index,
            slide_time_ms: Date.now() - this._prev.enteredAt
          })
          // 離脱後に再表示されたときの重複送信を防ぐ
          this._prev.index = -1
        },

        /**
         * CTAクリック時に呼び出す。
         */
        onCtaClick(currentSlideIndex) {
          this._send('cta_click', {
            current_slide_index: currentSlideIndex,
            current_slide_number: currentSlideIndex + 1
          })
        }
      }

      /* =====================================================
         SwipeHint — 初回のみ3秒後に非表示
         ===================================================== */

      const SwipeHint = {
        _el: null,
        _timer: null,
        _hidden: false,  // 2重呼び出し防止フラグ

        init(el) {
          this._el = el
          this._timer = setTimeout(() => this.hide(), 3000)
        },

        hide() {
          if (!this._el || this._hidden) return
          this._hidden = true
          clearTimeout(this._timer)

          // reduced-motion環境では transition が走らないため即時 .gone 付与
          if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            this._el.classList.add('gone')
            return
          }

          // 【2段構えフェードアウト】
          // animation の forwards フィルが opacity: 1 を固定しているため、
          // animation を先に剥がして opacity: 1 を確定させてから（1フレーム待機）
          // .hidden を付与して transition を発火させる。
          // 同一フレームで両方を変更すると transition の起点が取れず瞬時消えになる。
          this._el.style.animation = 'none'
          // 現在の opacity を明示的に確定させるため reflow を強制する
          // eslint-disable-next-line no-unused-expressions
          void this._el.offsetHeight  // reflow trigger
          requestAnimationFrame(() => {
            if (!this._el) return
            this._el.classList.add('hidden')
            // transitionend 後に完全非表示（スクリーンリーダーからも除去）
            this._el.addEventListener('transitionend', () => {
              if (this._el) this._el.classList.add('gone')
            }, { once: true })
          })
        }
      }

      /* =====================================================
         CTA未設定ガード — href 値で判定（# / 空文字 / javascript: を未設定とみなす）
         属性削除不要。href を Chatwork URL に変えるだけで自動解除される。
         ===================================================== */
      const ctaBtn = document.getElementById('cta-button')
      const ctaHref = ctaBtn?.getAttribute('href') || ''
      const ctaUnconfigured = /^javascript:|^#?$/.test(ctaHref.trim())

      if (ctaUnconfigured) {
        console.warn('[swipe-lp] CTA URLが未設定です。index.htmlの#cta-buttonのhrefをChatwork URLに変更してください。')
        ctaBtn.addEventListener('click', (e) => {
          e.preventDefault()
          alert('CTA URLが未設定です。README.mdの「公開時の設定手順」を参照してください。')
        })
      }

      /* =====================================================
         メイン処理
         ===================================================== */

      const init = async () => {
        const slidePaths = await SlideLoader.load()

        // 0枚のとき: エラーメッセージ表示してSwiper初期化しない
        if (slidePaths.length === 0) {
          document.getElementById('no-slides-message').classList.add('visible')
          document.getElementById('swipe-hint').style.display = 'none'
          return
        }

        // スライドをDOMに注入
        const wrapper = document.getElementById('swiper-wrapper')
        slidePaths.forEach((src, i) => {
          const slide = document.createElement('div')
          slide.className = 'swiper-slide'
          const img = document.createElement('img')
          img.src = src
          img.alt = `スライド ${i + 1} / ${slidePaths.length}`
          // loading="lazy" は最初の数枚のUXを損なうため eager で統一
          img.loading = 'eager'
          slide.appendChild(img)
          wrapper.appendChild(slide)
        })

        // GA4 初期化
        GA4Tracker.init(slidePaths.length)

        // ページネーション初期表示
        const updatePagination = (index) => {
          document.getElementById('pagination-text').textContent =
            `${index + 1} / ${slidePaths.length}`
        }
        updatePagination(0)

        // Swiper 初期化
        const swiper = new Swiper('#swiper-container', {
          // ループはGA4の slide_index が複雑になるため無効
          loop: false,
          // タッチスワイプを許可
          touchRatio: 1,
          grabCursor: true,
          // 「ページをめくる」感（デフォルト300msより若干ゆっくり）
          speed: 350,
          on: {
            slideChange() {
              const idx = this.activeIndex
              updatePagination(idx)
              GA4Tracker.onSlideChange(idx)
              SwipeHint.hide()
            }
          }
        })

        // 初回表示の slide_view (index=0)
        GA4Tracker.onSlideChange(0)

        // スワイプヒント初期化
        SwipeHint.init(document.getElementById('swipe-hint'))

        // 離脱時の slide_time 送信（bfcache対策: pagehide も併用）
        const sendExit = () => GA4Tracker.onPageHide()
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'hidden') sendExit()
        })
        window.addEventListener('pagehide', sendExit)

        // CTA クリック計測（未設定ガード中でなければ計測）
        if (!ctaUnconfigured) {
          ctaBtn.addEventListener('click', () => {
            GA4Tracker.onCtaClick(swiper.activeIndex)
          })
        }
      }

      init()
    </script>
  </body>

</html>
