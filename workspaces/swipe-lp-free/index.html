<!--
  Swipe LP Template v1.1 (Free Edition)
  スワイプLPテンプレート（無料配布）
  Template by オフィスウエダ / コーダー上田
  コーディングのご相談: https://officeueda.com/contact
  高機能版（GA4計測/SEO/OGP込み）についてもお気軽にどうぞ
-->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--
    =====================================================
    設定エリア（ここだけ編集してください）
    =====================================================
  -->

  <!-- アスペクト比: 9:16 / 1:1 / 4:5 / 16:9 -->
  <meta name="lp-ratio" content="4:5">

  <!-- CTAボタンの色（背景色 / 文字色） -->
  <meta name="cta-bg-color" content="#E8694A">
  <meta name="cta-text-color" content="#ffffff">

  <!-- ページタイトル -->
  <title>スワイプLPテンプレート（無料配布）| コーダー上田 / オフィスウエダ</title>

  <!--
    =====================================================
    Swiper.js CDN (swiper@11.1.14 / SRI固定)
    =====================================================
  -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@11.1.14/swiper-bundle.min.css"
    integrity="sha384-IFb872aCXZQb6BKRUHmGn0YHKnFl4ylZjkgVRRyMTEQ5bjo/H6xFUiLJm6opOO66"
    crossorigin="anonymous"
  >
  <script
    src="https://cdn.jsdelivr.net/npm/swiper@11.1.14/swiper-bundle.min.js"
    integrity="sha384-JiF4eFN9V3I2Fry7TzFM3XKdq0P3abiVxpOeHjGz4cwvas+uNg6pFWVmuD6MKXqG"
    crossorigin="anonymous"
  ></script>

  <style>
    /* =====================================================
       CSS変数 — アスペクト比はJSで上書きされる
       ===================================================== */
    :root {
      --ratio-w: 9;
      --ratio-h: 16;
      --cta-height: 80px;
      --pagination-height: 36px;
      --slide-bg: #111;
      --cta-bg: #e74c3c;
      --cta-text: #ffffff;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    /* =====================================================
       ページネーション（上部固定）
       ===================================================== */
    #pagination-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--pagination-height);
      display: flex;
      align-items: center;
      justify-content: center;
      /* コーラルオレンジ薄背景・チャコールテキスト（design-spec.md §9 準拠） */
      background: rgba(232, 105, 74, 0.15);
      color: #2D2D2D;
      font-size: 14px;
      letter-spacing: 0.05em;
      z-index: 100;
    }

    /* =====================================================
       スライダーラッパー
       スマホ: 幅100%基準
       PC: 高さ基準で中央寄せ
       ===================================================== */
    #slider-wrapper {
      position: fixed;
      top: var(--pagination-height);
      left: 0;
      right: 0;
      bottom: var(--cta-height);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #swiper-container {
      position: relative;
      background: var(--slide-bg);
      overflow: hidden;
    }

    .swiper-slide {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--slide-bg);
    }

    .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
    }

    /* =====================================================
       0枚のときのエラー表示
       ===================================================== */
    #no-slides-message {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #888;
      text-align: center;
      padding: 24px;
      gap: 12px;
    }

    #no-slides-message.visible {
      display: flex;
    }

    #no-slides-message p {
      font-size: 15px;
      line-height: 1.7;
    }

    #no-slides-message code {
      background: #222;
      color: #ccc;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }

    /* =====================================================
       スワイプヒント（初回のみ、3秒後に一度だけフェードアウトして消える）

       【設計メモ】
       animation の forwards と transition の競合を避けるため、
       フェードインは opacity 0 スタートの animation、
       フェードアウトは JS 側で rAF を使い animation を先に剥がしてから
       opacity: 0 → transition 発火させる2段構えを採用している。
       CSS だけで animation: none と opacity: 0 を同一フレームに当てると
       transition の起点が確定する前に終点が適用されてしまい瞬時消えになる。
       ===================================================== */
    #swipe-hint {
      position: absolute;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
      /* チャコール半透明背景 + 白文字で明暗問わず視認性確保 */
      background: rgba(45, 45, 45, 0.55);
      color: #FFFFFF;
      padding: 12px 24px;
      border-radius: 24px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
      font-size: 14px;
      letter-spacing: 0.1em;
      pointer-events: none;
      z-index: 50;
      white-space: nowrap;
      /* フェードアウト用 transition はベースに置く（.hidden 付与前から存在していないと発火しない） */
      transition: opacity 0.8s ease;
      /* フェードイン: 表示開始時に1回だけ実行（infinite 禁止） */
      animation: hint-fadein 0.4s ease forwards;
    }

    /* .hidden は opacity だけ指定（animation の操作は JS 側で行う） */
    #swipe-hint.hidden {
      opacity: 0;
    }

    /* フェードアウト完了後に完全非表示（transitionend でJSが付与） */
    #swipe-hint.gone {
      display: none;
    }

    /* PC表示（768px以上）で文字とパディングを拡大 */
    @media (min-width: 768px) {
      #swipe-hint {
        font-size: 18px;
        padding: 14px 32px;
      }
    }

    /* アニメーション軽減モード（vestibular disorder / 前庭障害対応） */
    @media (prefers-reduced-motion: reduce) {
      #swipe-hint {
        animation: none;
        transition: none;
      }
    }

    @keyframes hint-fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* =====================================================
       CTA（下部固定）
       ===================================================== */
    #cta-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--cta-height);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.15);
      z-index: 100;
      padding: 8px 16px;
      gap: 4px;
    }

    /* =====================================================
       CTAボタン — テキストとリンク先はここを差し替え
       ===================================================== */
    #cta-button {
      display: block;
      width: 100%;
      max-width: 480px;
      text-align: center;
      background: var(--cta-bg);
      color: var(--cta-text);
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      border-radius: 6px;
      padding: 12px 20px;
      letter-spacing: 0.05em;
      transition: opacity 0.15s ease;
    }

    #cta-button:active {
      opacity: 0.8;
    }

    /* PC: ホバー */
    @media (hover: hover) {
      #cta-button:hover {
        opacity: 0.85;
      }
    }

    /* クレジット */
    .credit {
      text-align: center;
      opacity: 0.6;
    }

    .credit small {
      font-size: 11px;
      color: #666;
    }

    .credit a {
      color: #666;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <!-- ページネーション（上部） -->
  <div id="pagination-bar" role="status" aria-live="polite" aria-label="スライド進捗">
    <span id="pagination-text">- / -</span>
  </div>

  <!-- スライダー本体 -->
  <div id="slider-wrapper">
    <div id="swiper-container" class="swiper">
      <div class="swiper-wrapper" id="swiper-wrapper"></div>

      <!-- 0枚のときのメッセージ -->
      <div id="no-slides-message">
        <p>
          <code>images/</code> フォルダに<br>
          <code>slide-01.webp</code> を配置してください
        </p>
        <p style="font-size:13px; color:#666;">
          対応形式: webp / jpg / png
        </p>
      </div>

      <!-- スワイプヒント（初回のみ） -->
      <div id="swipe-hint">← スワイプ →</div>
    </div>
  </div>

  <!-- CTA（下部固定） -->
  <div id="cta-bar">
    <!--
      ↓↓↓ 公開前にここを設定してください ↓↓↓
      href: README.md「公開時の設定手順」参照
      設定後は data-cta-unconfigured 属性を削除してください。
    -->
    <a id="cta-button" href="javascript:void(0)" data-cta-unconfigured="true" rel="noopener noreferrer">Chatworkでテンプレを受け取る</a>
    <div class="credit">
      <small>Template by <a href="https://officeueda.com" rel="noopener noreferrer">オフィスウエダ</a></small>
    </div>
  </div>

  <script>
    'use strict'

    /* =====================================================
       設定読み込み
       ===================================================== */

    /**
     * <meta name="lp-ratio"> からアスペクト比を読み取り、
     * CSS変数と数値ペアを返す。
     * 不正値の場合は 9:16 にフォールバック。
     */
    const readRatio = () => {
      const meta = document.querySelector('meta[name="lp-ratio"]')
      const raw = meta ? meta.getAttribute('content') : '9:16'
      const allowed = { '9:16': [9, 16], '1:1': [1, 1], '4:5': [4, 5], '16:9': [16, 9] }
      return allowed[raw] || [9, 16]
    }

    const [ratioW, ratioH] = readRatio()
    document.documentElement.style.setProperty('--ratio-w', ratioW)
    document.documentElement.style.setProperty('--ratio-h', ratioH)

    /**
     * <meta name="cta-bg-color"> / <meta name="cta-text-color"> から
     * CTAボタンの色を読み取り、CSS変数に反映する。
     * meta タグがなければデフォルト色にフォールバック。
     */
    const ctaBg = document.querySelector('meta[name="cta-bg-color"]')?.content || '#e74c3c'
    const ctaText = document.querySelector('meta[name="cta-text-color"]')?.content || '#ffffff'
    document.documentElement.style.setProperty('--cta-bg', ctaBg)
    document.documentElement.style.setProperty('--cta-text', ctaText)

    /* =====================================================
       スライダーサイズ計算
       ===================================================== */

    /**
     * 利用可能エリア（pagination + CTA を除いた領域）に
     * アスペクト比を維持して最大サイズを計算する。
     */
    const calcSliderSize = () => {
      const ctaHeight = parseInt(
        getComputedStyle(document.documentElement).getPropertyValue('--cta-height'), 10
      )
      const paginationHeight = parseInt(
        getComputedStyle(document.documentElement).getPropertyValue('--pagination-height'), 10
      )
      const availW = window.innerWidth
      const availH = window.innerHeight - ctaHeight - paginationHeight

      // 幅基準で高さを計算
      const hFromW = availW * ratioH / ratioW
      if (hFromW <= availH) {
        return { width: availW, height: Math.round(hFromW) }
      }
      // 高さ基準で幅を計算（PC等の横長画面）
      const wFromH = availH * ratioW / ratioH
      return { width: Math.round(wFromH), height: availH }
    }

    const applySliderSize = () => {
      const { width, height } = calcSliderSize()
      const container = document.getElementById('swiper-container')
      container.style.width = width + 'px'
      container.style.height = height + 'px'
    }

    applySliderSize()
    window.addEventListener('resize', applySliderSize)

    /* =====================================================
       SlideLoader — imagesフォルダを連番で自動探索する
       ===================================================== */

    /**
     * images/slide-{n}.{ext} を HEAD リクエストで存在確認し、
     * 見つかった順に画像パスの配列を返す。
     * 拡張子は webp → jpg → png の順に試す。
     * 404 になった番号で打ち止め。
     */
    const SlideLoader = {
      EXTS: ['webp', 'jpg', 'png'],
      IMAGE_DIR: 'images',
      MAX_SLIDES: 200,

      _pad: (n) => String(n).padStart(2, '0'),

      _checkExists: async (url) => {
        try {
          const res = await fetch(url, { method: 'HEAD' })
          return res.ok
        } catch {
          return false
        }
      },

      /**
       * 連番スライドを探索して見つかったURLリストを返す。
       * @returns {Promise<string[]>}
       */
      load: async function() {
        const paths = []
        let n = 1
        while (n <= this.MAX_SLIDES) {
          const base = `${this.IMAGE_DIR}/slide-${this._pad(n)}`
          let found = null
          for (const ext of this.EXTS) {
            const url = `${base}.${ext}`
            if (await this._checkExists(url)) {
              found = url
              break
            }
          }
          if (!found) break
          paths.push(found)
          n++
        }
        return paths
      }
    }

    /* =====================================================
       SwipeHint — 初回のみ3秒後に非表示
       ===================================================== */

    const SwipeHint = {
      _el: null,
      _timer: null,
      _hidden: false,  // 2重呼び出し防止フラグ

      init(el) {
        this._el = el
        this._timer = setTimeout(() => this.hide(), 3000)
      },

      hide() {
        if (!this._el || this._hidden) return
        this._hidden = true
        clearTimeout(this._timer)

        // reduced-motion環境では transition が走らないため即時 .gone 付与
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          this._el.classList.add('gone')
          return
        }

        // 【2段構えフェードアウト】
        // animation の forwards フィルが opacity: 1 を固定しているため、
        // animation を先に剥がして opacity: 1 を確定させてから（1フレーム待機）
        // .hidden を付与して transition を発火させる。
        // 同一フレームで両方を変更すると transition の起点が取れず瞬時消えになる。
        this._el.style.animation = 'none'
        // 現在の opacity を明示的に確定させるため getComputedStyle で強制スタイル計算
        // eslint-disable-next-line no-unused-expressions
        void this._el.offsetHeight  // reflow trigger
        requestAnimationFrame(() => {
          if (!this._el) return
          this._el.classList.add('hidden')
          // transitionend 後に完全非表示（スクリーンリーダーからも除去）
          this._el.addEventListener('transitionend', () => {
            if (this._el) this._el.classList.add('gone')
          }, { once: true })
        })
      }
    }

    /* =====================================================
       CTA未設定ガード — data-cta-unconfigured が残っている場合に警告
       ===================================================== */
    const ctaBtn = document.getElementById('cta-button')
    if (ctaBtn?.dataset.ctaUnconfigured === 'true') {
      console.warn('[swipe-lp] CTA URLが未設定です。index.htmlの#cta-buttonのhrefをChatwork URLに変更してください。')
      ctaBtn.addEventListener('click', (e) => {
        e.preventDefault()
        alert('CTA URLが未設定です。README.mdの「公開時の設定手順」を参照してください。')
      })
    }

    /* =====================================================
       メイン処理
       ===================================================== */
    const init = async () => {
      const slidePaths = await SlideLoader.load()

      // 0枚のとき: エラーメッセージ表示してSwiper初期化しない
      if (slidePaths.length === 0) {
        document.getElementById('no-slides-message').classList.add('visible')
        document.getElementById('swipe-hint').style.display = 'none'
        return
      }

      // スライドをDOMに注入
      const wrapper = document.getElementById('swiper-wrapper')
      slidePaths.forEach((src, i) => {
        const slide = document.createElement('div')
        slide.className = 'swiper-slide'
        const img = document.createElement('img')
        img.src = src
        img.alt = `スライド ${i + 1} / ${slidePaths.length}`
        img.loading = 'eager'
        slide.appendChild(img)
        wrapper.appendChild(slide)
      })

      // ページネーション初期表示
      const updatePagination = (index) => {
        document.getElementById('pagination-text').textContent =
          `${index + 1} / ${slidePaths.length}`
      }
      updatePagination(0)

      // Swiper 初期化
      new Swiper('#swiper-container', {
        loop: false,
        touchRatio: 1,
        grabCursor: true,
        speed: 350,  // 「ページをめくる」感（デフォルト300msより若干ゆっくり）
        on: {
          slideChange() {
            updatePagination(this.activeIndex)
            SwipeHint.hide()
          }
        }
      })

      // スワイプヒント初期化
      SwipeHint.init(document.getElementById('swipe-hint'))
    }

    init()
  </script>
</body>
</html>
